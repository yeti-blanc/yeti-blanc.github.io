<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Yeti Blanc</title>
<link href="https://fonts.googleapis.com/css2?family=Antonio:wght@400;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--cb:#56AEE2;--bg:#06080e;--text:#f0f0f0;--muted:#5a6880;--border:rgba(86,174,226,0.12);}
body{font-family:'Antonio',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;overflow:hidden;}
canvas{position:fixed;inset:0;z-index:0;pointer-events:none;}
.bg-img{position:fixed;inset:0;z-index:0;pointer-events:none;}
.bg-img img{width:100%;height:100%;object-fit:cover;display:block;filter:brightness(0.18) saturate(0.6);}
.bg-img::after{content:'';position:absolute;inset:0;background:radial-gradient(ellipse 70% 70% at 50% 50%,transparent 20%,rgba(6,8,14,0.7) 70%,rgba(6,8,14,0.97) 100%);}
.spotlight{position:fixed;width:600px;height:600px;border-radius:50%;background:radial-gradient(circle,rgba(86,174,226,0.07) 0%,transparent 70%);top:50%;left:50%;transform:translate(-50%,-50%);pointer-events:none;z-index:1;}
.ring{position:absolute;width:520px;height:520px;border-radius:50%;border:1px solid rgba(86,174,226,0.1);top:50%;left:50%;transform:translate(-50%,-50%);pointer-events:none;animation:spin 40s linear infinite;z-index:1;}
.ring2{position:absolute;width:700px;height:700px;border-radius:50%;border:1px solid rgba(86,174,226,0.05);top:50%;left:50%;transform:translate(-50%,-50%);pointer-events:none;animation:spin 65s linear infinite reverse;z-index:1;}
@keyframes spin{from{transform:translate(-50%,-50%) rotate(0deg);}to{transform:translate(-50%,-50%) rotate(360deg);}}
.center{position:relative;z-index:2;display:flex;flex-direction:column;align-items:center;text-align:center;padding:40px 24px;}
.img-frame{width:130px;height:130px;border-radius:50%;overflow:hidden;border:1px solid rgba(86,174,226,0.25);box-shadow:0 0 32px rgba(86,174,226,0.12),0 0 0 4px rgba(86,174,226,0.05);margin-bottom:24px;animation:fadeUp 0.8s 0.1s both;flex-shrink:0;}
.img-frame img{width:100%;height:100%;object-fit:cover;display:block;}
.img-placeholder{width:100%;height:100%;background:rgba(86,174,226,0.05);display:flex;align-items:center;justify-content:center;}
.img-placeholder span{font-size:9px;letter-spacing:3px;text-transform:uppercase;color:var(--muted);opacity:0.5;}
.eyebrow{font-size:10px;letter-spacing:6px;text-transform:uppercase;color:var(--muted);margin-bottom:16px;animation:fadeUp 0.8s 0.2s both;}
.name{font-size:clamp(72px,13vw,160px);font-weight:700;letter-spacing:0.04em;text-transform:uppercase;line-height:0.85;color:#fff;margin-bottom:4px;animation:fadeUp 0.8s 0.3s both;}
.name-last{font-size:clamp(72px,13vw,160px);font-weight:700;letter-spacing:0.04em;text-transform:uppercase;line-height:0.85;color:transparent;-webkit-text-stroke:2px var(--cb);margin-bottom:32px;animation:fadeUp 0.8s 0.4s both;}
nav{display:flex;flex-wrap:wrap;justify-content:center;gap:10px;margin-bottom:36px;animation:fadeUp 0.8s 0.5s both;}
.nav-link{padding:10px 22px;border:1px solid var(--border);border-radius:40px;text-decoration:none;color:var(--muted);font-size:clamp(12px,1.5vw,16px);letter-spacing:0.12em;text-transform:uppercase;transition:all 0.2s ease;background:rgba(86,174,226,0.03);}
.nav-link:hover{color:#fff;border-color:var(--cb);background:rgba(86,174,226,0.1);box-shadow:0 0 20px rgba(86,174,226,0.15);}
.player{width:min(380px,90vw);border:1px solid var(--border);border-radius:12px;padding:18px 20px;background:rgba(6,8,14,0.75);backdrop-filter:blur(8px);animation:fadeUp 0.8s 0.7s both;}
.player-label{font-size:9px;letter-spacing:4px;text-transform:uppercase;color:var(--muted);margin-bottom:7px;}
.player-name{font-size:13px;letter-spacing:0.05em;text-transform:uppercase;color:var(--text);margin-bottom:9px;}
.player iframe{width:100%;border:0;border-radius:4px;display:block;}
.player-more{display:inline-block;margin-top:10px;font-size:9px;letter-spacing:3px;text-transform:uppercase;color:var(--cb);text-decoration:none;opacity:0.7;transition:opacity 0.2s;}
.player-more:hover{opacity:1;}
@keyframes fadeUp{from{opacity:0;transform:translateY(12px);}to{opacity:1;transform:translateY(0);}}
@media(max-width:600px){.ring,.ring2{display:none;}.name,.name-last{font-size:clamp(60px,18vw,100px);}.img-frame{width:100px;height:100px;}}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div class="bg-img">
  <img src="Collage_Test.png" alt="" id="bgImg">
</div>
<div class="spotlight"></div>
<div class="ring"></div>
<div class="ring2"></div>
<div class="center">
  <div class="img-frame">
    <img src="YB Neon Blue Logo_Large Background.png" alt="Yeti Blanc" id="frameImg">
    <div class="img-placeholder" id="ph" style="display:none"><span>photo</span></div>
  </div>
  <p class="eyebrow">Music &nbsp;·&nbsp; Voice &nbsp;·&nbsp; Production</p>
  <div class="name">Yeti</div>
  <div class="name-last">Blanc</div>
  <nav>
    <a href="#" class="nav-link">Music</a>
    <a href="#" class="nav-link">Work With Me</a>
    <a href="#" class="nav-link">Merch</a>
    <a href="#" class="nav-link">About</a>
    <a href="#" class="nav-link">Contact</a>
  </nav>
  <div class="player">
    <p class="player-label">Now Playing</p>
    <p class="player-name" id="t1"></p>
    <iframe id="b1" seamless height="42"></iframe>
    <a href="https://yetiblanc.bandcamp.com" target="_blank" class="player-more">Full catalog &#8594;</a>
  </div>
</div>
<script>
const cv=document.getElementById('c'),cx=cv.getContext('2d');let st=[];
function rs(){cv.width=innerWidth;cv.height=innerHeight;}
function is(){st=[];for(let i=0;i<200;i++)st.push({x:Math.random()*cv.width,y:Math.random()*cv.height,r:Math.random()*1.1+0.2,a:Math.random()*0.6+0.1,s:Math.random()*0.4+0.05});}
function dr(){cx.clearRect(0,0,cv.width,cv.height);const t=Date.now()/1000;st.forEach((s,i)=>{const p=s.a*(0.5+0.5*Math.sin(t*s.s+i));cx.beginPath();cx.arc(s.x,s.y,s.r,0,Math.PI*2);cx.fillStyle=`rgba(255,255,255,${p})`;cx.fill();});requestAnimationFrame(dr);}
rs();is();dr();window.addEventListener('resize',()=>{rs();is();});
document.getElementById('bgImg').addEventListener('error',()=>{document.getElementById('bgImg').style.display='none';});
document.getElementById('frameImg').addEventListener('error',()=>{document.getElementById('frameImg').style.display='none';document.getElementById('ph').style.display='flex';});
const tr=[{name:"Mornin' Man (feat. Greg Cote)",id:"3614133750"},{name:"I Believe In Travis Kelce",id:"86896478"},{name:"Pebble Drive",id:"566721571"},{name:"Pirate Radio Anthem",id:"2574557713"}];
const t=tr[Math.floor(Math.random()*tr.length)];
document.getElementById('t1').textContent=t.name;
document.getElementById('b1').src=`https://bandcamp.com/EmbeddedPlayer/track=${t.id}/size=small/bgcol=06080e/linkcol=56AEE2/transparent=true/`;
</script>
</body>
</html>
